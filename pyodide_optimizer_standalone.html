<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Battery Optimizer (DP + Quiver Overlay)</title>
<style>
  :root { --bg:#0b1020; --fg:#e7e9ee; --muted:#9aa4b2; }
  html, body { height:100%; margin:0; background:var(--bg); color:var(--fg); font-family:ui-sans-serif,system-ui; display:grid; place-items:center; }
  .card { width:min(1200px,96vw); background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.35); padding:28px 24px; }
  h1 { margin:0 0 6px; font-size:22px; font-weight:700; }
  p.sub { margin:0 0 18px; color:var(--muted); }
  .rows { display:grid; gap:10px; }
  .row { display:grid; grid-template-columns:220px 1fr auto; gap:12px; align-items:center; }
  input[type="range"] { width:100%; accent-color:#7aa2ff; }
  input[type="number"] { width:100px; padding:6px 8px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.07); color:var(--fg); }
  .tag { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); padding:4px 8px; border-radius:10px; }
  .plots { display:grid; grid-template-columns:1fr; gap:16px; margin-top:20px; }
  @media (min-width:1100px){ .plots{ grid-template-columns:1fr 1fr; } }
  .plot-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:12px; }
  canvas { width:100%; height:300px; border-radius:12px; background:rgba(0,0,0,0.2); display:block; }
  .plot-title { margin:6px 0 10px; font-weight:600; font-size:14px; color:var(--muted); display:flex; justify-content:space-between; align-items:center; }
  .legend { display:flex; gap:10px; font-size:12px; color:#cbd5e1; }
  .sw { width:10px; height:10px; border-radius:2px; display:inline-block; }
  .status { margin-top:10px; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<div class="card">
  <h1>Battery Optimizer</h1>
  <p class="sub">Fast local optimization + inference, using python + webassembly.</p>

  <div class="rows">
    <div class="row">
      <label>Battery capacity (kWh)</label>
      <input id="capacity" type="range" min="1" max="200" value="40" step="1"/>
      <span id="capLabel" class="tag">40 kWh</span>
    </div>
    <div class="row">
      <label>Max power (kW)</label>
      <input id="pmax" type="range" min="1" max="50" value="5" step="1"/>
      <span id="pmaxLabel" class="tag">5 kW</span>
    </div>
    <div class="row">
      <label>Min energy (% capacity)</label>
      <input id="minpct" type="number" min="0" max="100" step="1" value="10"/>
    </div>
  </div>

  <div class="plots">
    <div class="plot-card" style="grid-column:1/-1;">
      <div class="plot-title">
        <span>Inputs: Prices ($/kWh, left) & Load (kW, right)</span>
        <span class="legend">
          <span><span class="sw" style="background:#93c5fd"></span> buy</span>
          <span><span class="sw" style="background:#fca5a5"></span> sell</span>
          <span><span class="sw" style="background:#a7f3d0"></span> load</span>
        </span>
      </div>
      <canvas id="plotPrices"></canvas>
    </div>
    <div class="plot-card" style="grid-column:1/-1;">
      <div class="plot-title"><span id="socTitle">State of Charge</span></div>
      <canvas id="plotSOC"></canvas>
    </div>
    <div class="plot-card" style="grid-column:1/-1;">
      <div class="plot-title">
        <span>Power flows (kW)</span>
        <span class="legend">
          <span><span class="sw" style="background:#c084fc"></span> charge</span>
          <span><span class="sw" style="background:#34d399"></span> import (charge + load)</span>
        </span>
      </div>
      <canvas id="plotPower"></canvas>
    </div>
  </div>

  <div id="status" class="status">Loading Pyodide…</div>
</div>

<script type="module">

  if (!window.pyodide) return;

  runDPSolve();

for cid in ["plotPrices"]:
    c = document.getElementById(cid)
    c.addEventListener("mousedown", create_proxy(on_mousedown))
    c.addEventListener("mousemove", create_proxy(on_mousemove))
    c.addEventListener("mouseup", create_proxy(on_mouseup))
  `

  // Unified input listeners
  document.getElementById("capacity").addEventListener("input", e=>{
    document.getElementById("capLabel").textContent = e.target.value+" kWh";
    scheduleSolve();
  });
  document.getElementById("pmax").addEventListener("input", e=>{
    document.getElementById("pmaxLabel").textContent = e.target.value+" kW";
    scheduleSolve();
  });
  document.getElementById("minpct").addEventListener("input", scheduleSolve);

  ["plotPrices"].forEach(cid=>{
    document.getElementById(cid).addEventListener("mouseup", scheduleSolve);
  })
  // Rollout on SOC hover
  status.textContent = "Running initial solve…";
  await runDPSolve();

  const socCanvas = document.getElementById("plotSOC");
  socCanvas.addEventListener("mousemove", debounce(async ev=>{
    if (!pyodide.globals.get("dp_ready")) return;
    const r = socCanvas.getBoundingClientRect();
    const x = (ev.clientX - r.left) / r.width;
    const y = (ev.clientY - r.top) / r.height;
    const cap = parseFloat(document.getElementById("capacity").value);
    const pmax = parseFloat(document.getElementById("pmax").value);
    const t0 = Math.floor(x * 96);
    const s0 = (1-y)*cap;

    try {
      await pyodide.runPythonAsync(`
xs_out, ys_soc, ys_pow = rollout(${t0}, ${s0}, ${cap}, ${pmax}, buy, sell, load)
draw_hover_path(xs_out, ys_soc, ys_pow, ${cap}, ${pmax})
`);
      const dp_elapsed = pyodide.globals.get("dp_elapsed_time");
      const rollout_elapsed = pyodide.globals.get("rollout_elapsed_time");
      status.textContent = `✅ Solve: ${dp_elapsed.toFixed(1)} ms | Rollout inference: ${rollout_elapsed.toFixed(1)} ms`;
    } catch(e){console.error(e);}
  }, 10));


});

// JS wrapper for DP solve
async function runDPSolve(){
  try {
    await pyodide.runPythonAsync(`
buy, sell, load = expand_inputs(buy_ui=buy_ui, sell_ui=sell_ui, load_ui=load_ui)
dp_elapsed_time = solve_dp(buy=buy, sell=sell, load=load,
  cap=float(document.getElementById("capacity").value),
  pmax=float(document.getElementById("pmax").value),
  minpct=float(document.getElementById("minpct").value)
)
draw_quiver(float(document.getElementById("capacity").value),
            float(document.getElementById("pmax").value))
`);
    const dp_elapsed = pyodide.globals.get("dp_elapsed_time");
    status.textContent = `✅ Solve: ${dp_elapsed.toFixed(1)} ms`;
  } catch(e) {
    status.textContent = "❌ Solve error";
    console.error(e);
  }
  }
</script>
